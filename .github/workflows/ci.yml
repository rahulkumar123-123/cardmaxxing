name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cardmaxxing
          POSTGRES_PASSWORD: cardmaxxing
          POSTGRES_DB: cardmaxxing_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://cardmaxxing:cardmaxxing@localhost:5432/cardmaxxing_test?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_that_is_long_enough_for_zod
      JWT_REFRESH_SECRET: ci_refresh_secret_that_is_long_enough_zod
      CORS_ORIGIN: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            web/package-lock.json

      - name: Install root tooling
        run: npm ci

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: server

      - name: Apply migrations
        run: npx prisma migrate deploy
        working-directory: server

      - name: Seed the catalogue
        run: npm run db:seed
        working-directory: server

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
