# Render blueprint — provisions the Postgres instance and the API service together.
# The front-end is deployed separately on Vercel (see vercel.json).
databases:
  - name: cardmaxxing-db
    databaseName: cardmaxxing
    user: cardmaxxing
    plan: free
    region: singapore
    postgresMajorVersion: '16'

services:
  - type: web
    name: cardmaxxing-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '4000'
      - key: DATABASE_URL
        fromDatabase:
          name: cardmaxxing-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: TRUST_PROXY
        value: 'true'
      # Set this to your deployed Vercel origin, e.g. https://cardmaxxing.vercel.app
      - key: CORS_ORIGIN
        sync: false
      # Optional. Leave unset to disable the AI explanation layer entirely.
      - key: ANTHROPIC_API_KEY
        sync: false
