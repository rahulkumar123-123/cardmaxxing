services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cardmaxxing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cardmaxxing}
      POSTGRES_DB: ${POSTGRES_DB:-cardmaxxing}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cardmaxxing} -d ${POSTGRES_DB:-cardmaxxing}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-cardmaxxing}:${POSTGRES_PASSWORD:-cardmaxxing}@db:5432/${POSTGRES_DB:-cardmaxxing}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      TRUST_PROXY: 'true'
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - '${API_PORT:-4000}:4000'
    # Migrations run on boot so `docker compose up` yields a working stack.
    # Seed separately once: docker compose exec api npx prisma db seed
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-8080}:80'

volumes:
  postgres-data:
